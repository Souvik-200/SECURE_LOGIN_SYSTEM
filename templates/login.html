{% extends "base.html" %}
{% block title %}Sign in — Secure Login{% endblock %}
{% block content %}
<section class="card narrow">
  <h1>Sign in</h1>
  <p class="subtle">Use your email and password. CAPTCHA limits automated attempts.</p>

  <form method="post" class="stack" id="login-form" novalidate>
    {{ form.hidden_tag() }}

    <label class="field">
      <span>Email</span>
      {{ form.email(class="input", autocomplete="email", required=true) }}
      {% for e in form.email.errors %}<span class="error">{{ e }}</span>{% endfor %}
    </label>

    <label class="field">
      <span>Password</span>
      {{ form.password(class="input", autocomplete="current-password", required=true) }}
      {% for e in form.password.errors %}<span class="error">{{ e }}</span>{% endfor %}
    </label>

    <label class="field checkbox-row">
      {{ form.remember_device(class="checkbox") }}
      <span>{{ form.remember_device.label.text }}</span>
    </label>

    <div class="captcha-box">
      <p class="captcha-question">{{ captcha_question }}</p>
      <label class="field">
        <span>Your answer</span>
        {{ form.captcha_answer(class="input", inputmode="numeric", pattern="[0-9]*", autocomplete="off", required=true) }}
        {% for e in form.captcha_answer.errors %}<span class="error">{{ e }}</span>{% endfor %}
      </label>
    </div>

    <button type="submit" class="btn btn-primary">Sign in</button>
  </form>
  <p class="subtle foot-link">No account? <a href="{{ url_for('auth.register_page') }}">Register</a></p>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/validation.js') }}" defer></script>
{% endblock %}
